<head>
    <meta charset="UTF-8">

    <title>Real-Time Time Zone & Solar Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #0b0e14; }

        /* Central HUD Styling */
        #central-clock-container {
            position: absolute;
            top: 50%;
            left: 39%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }
        .clock-row { display: flex; align-items: baseline; margin-bottom: 5px; }
        .clock-label { font-size: 20px; color: #888; width: 150px; text-align: right; margin-right: 20px; }
        .clock-value { font-size: 36px; font-weight: regular; letter-spacing: 1px; }

        /* Time Zone Label Styling */
        .tz-label {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            text-align: Center;
            font-size: 11px;
            line-height: 1.2;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
            white-space: nowrap;
        }
        .tz-time { font-weight: regular; color: #00d4ff; font-size: 11px; }
        .tz-date { color: #ccc; }
        .tz-zone { color: #eedc83; text-transform: uppercase; letter-spacing: 1px; }

        /* Overlay for Day/Night */
        .solar-terminator {
            fill: rgba(0, 0, 0, 0.5);
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 1;
        }
    </style>
</head>
<body>

<div id="central-clock-container">
    <div class="clock-row">
        <div class="clock-label"></div>
        <div id="hud-date" class="clock-value">--.--.----</div>

    <div class="clock-row">

    function updateSolarTerminator() {
        if (nightLayer) map.removeLayer(nightLayer);
        const now = new Date();
        const julianDay = (now / 86400000) - (now.getTimezoneOffset() / 1440) + 2440587.5;
        const T = (julianDay - 2451545.0) / 36525;
        const L0 = 280.46646 + 36000.76983 * T;
        const M = 357.52911 + 35999.05029 * T;
        const lambda = L0 + 1.914666 * Math.sin(M * Math.PI / 180);
        const epsilon = 23.43929 - 0.01300 * T;
        const delta = Math.asin(Math.sin(epsilon * Math.PI / 180) * Math.sin(lambda * Math.PI / 180)) * 180 / Math.PI;
        const utcMinutes = now.getUTCHours() * 60 + now.getUTCMinutes();
        const sunLon = 180 - (utcMinutes / 4);

        const latPoints = [];
        for (let lon = -180; lon <= 180; lon += 1) {
            const lat = Math.atan(-Math.cos((lon - sunLon) * Math.PI / 180) / Math.tan(delta * Math.PI / 180)) * 180 / Math.PI;
            latPoints.push([lat, lon]);
        }
        const nightPath = delta > 0 
            ? [[-90, -180], ...latPoints, [-90, 180], [-90, -180]] 
            : [[90, -180], ...latPoints, [90, 180], [90, -180]];

        nightLayer = L.polygon(nightPath, {
            fillColor: '#000',
            fillOpacity: 0.5,
            stroke: false,
            interactive: false
        }).addTo(map);
    }

    function updateClocks() {
        const now = new Date();

        // Update Central HUD
        const pad = (n) => n.toString().padStart(2, '0');
        document.getElementById('hud-date').innerText = now.toLocaleDateString('en-US', { 
    month: 'long', 
    day: 'numeric', 
    year: 'numeric' 
});
        document.getElementById('hud-day').innerText = now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
        document.getElementById('hud-time').innerText = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

        // Update Timezone Labels
        labels.forEach(item => {
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const zoneDate = new Date(utc + (3600000 * item.offset));
            const timeStr = zoneDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            const dateStr = zoneDate.toLocaleDateString([], { month: 'short', day: 'numeric' });
            const el = document.getElementById(`tz-label-${item.offset}`);
            if (el) {
                el.querySelector('.tz-time').innerText = timeStr;
                el.querySelector('.tz-date').innerText = dateStr;
            }
        });
    }

    initGrid();
    updateClocks();
    updateSolarTerminator();
    setInterval(updateClocks, 1000);
    setInterval(updateSolarTerminator, 60000);
