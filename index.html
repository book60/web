<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadline Dashboard - Optimized</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0a0a0a;
            --text-color: #f0f0f0;
            --accent-color: #4a90e2; 
            --border-style: 1px solid rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .main-wrapper {
            display: flex;
            gap: 60px;
            max-width: 1200px;
            width: 100%;
            flex-wrap: wrap; /* Жижиг дэлгэцэнд зориулж */
        }

        /* --- LEFT SIDE --- */
        .content-area {
            flex: 2;
            min-width: 300px;
        }

        #current-date {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 40px;
            letter-spacing: 1px;
            border-left: 4px solid var(--accent-color);
            padding-left: 15px;
        }

        .deadline-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .deadline-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-row-1 {
            display: grid;
            grid-template-columns: 1.5fr 1fr 100px;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: var(--border-style);
        }

        .timer-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .target-date {
            font-size: 0.9rem;
            color: #888;
            text-align: right;
            padding-right: 20px;
        }

        .countdown-text {
            font-size: 1rem;
            font-weight: bold;
            text-align: right;
        }

        .note-area {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: #ccc;
            padding: 12px;
            font-size: 0.9rem;
            resize: vertical;
            box-sizing: border-box;
            line-height: 1.5;
            min-height: 80px;
            transition: border 0.3s;
        }

        .note-area:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.05);
        }

        /* --- RIGHT SIDE CLOCK --- */
        .sidebar {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 350px;
        }

        .clock-container {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #1a1c27 0%, #000 100%);
            border-radius: 50%;
            position: sticky;
            top: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(74, 144, 226, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        .clock {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .clock::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
            transform: translateX(-50%);
        }

        .hour { width: 4px; height: 70px; background: #fff; z-index: 3; }
        .min { width: 3px; height: 110px; background: #999; z-index: 2; }
        .sec { width: 1.5px; height: 125px; background: #ff4d4d; z-index: 1; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column-reverse; align-items: center; }
            .sidebar { position: static; min-width: 100%; margin-bottom: 50px; }
            .clock-container { position: relative; top: 0; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="content-area">
        <div id="current-date">Loading...</div>

        <div class="deadline-list">
            <div class="deadline-card" data-id="task1" data-time="2026-05-15T09:00:00">
                <div class="card-row-1">
                    <div class="timer-name">Write Chapter 1-3</div>
                    <div class="target-date">May 15, 2026</div>
                    <div class="countdown-text">-- days</div>
                </div>
                <textarea class="note-area" placeholder="Notes for Chapter 1-3..."></textarea>
            </div>

            <div class="deadline-card" data-id="task2" data-time="2026-05-16T18:00:00">
                <div class="card-row-1">
                    <div class="timer-name">Write Chapter 4-5</div>
                    <div class="target-date">May 16, 2026</div>
                    <div class="countdown-text">-- days</div>
                </div>
                <textarea class="note-area" placeholder="Notes for Chapter 4-5..."></textarea>
            </div>

            </div>
    </div>

    <div class="sidebar">
        <div class="clock-container">
            <div class="clock">
                <div class="hand hour" id="hour-hand"></div>
                <div class="hand min" id="min-hand"></div>
                <div class="hand sec" id="sec-hand"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Огноо шинэчлэх
    function updateDate() {
        const now = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('current-date').innerText = now.toLocaleDateString('en-US', options);
    }

    // Аналог цаг
    function updateAnalogClock() {
        const now = new Date();
        const s = now.getSeconds() * 6;
        const m = now.getMinutes() * 6 + (now.getSeconds() * 0.1);
        const h = (now.getHours() % 12) * 30 + (now.getMinutes() / 2);

        document.getElementById('sec-hand').style.transform = `translateX(-50%) rotate(${s}deg)`;
        document.getElementById('min-hand').style.transform = `translateX(-50%) rotate(${m}deg)`;
        document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${h}deg)`;
    }

    // Хоног тоолох
    function updateCountdowns() {
        const cards = document.querySelectorAll('.deadline-card');
        cards.forEach(card => {
            const targetTime = new Date(card.getAttribute('data-time')).getTime();
            const now = new Date().getTime();
            const diff = targetTime - now;
            const display = card.querySelector('.countdown-text');

            if (diff <= 0) {
                display.innerText = "Expired";
                display.style.color = "#ff4d4d";
            } else {
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                display.innerText = `${days} days left`;
                display.style.color = days <= 7 ? "#ffcc00" : "#4a90e2";
            }
        });
    }

    // Тэмдэглэл хадгалах (LocalStorage)
    function setupNotes() {
        const notes = document.querySelectorAll('.note-area');
        notes.forEach(note => {
            const id = note.parentElement.getAttribute('data-id');
            
            // Өмнөх хадгалсан өгөгдлийг ачаалах
            const savedNote = localStorage.getItem('note_' + id);
            if (savedNote) note.value = savedNote;

            // Бичих болгонд хадгалах
            note.addEventListener('input', () => {
                localStorage.setItem('note_' + id, note.value);
            });
        });
    }

    // Ажиллуулж эхлэх
    setInterval(updateAnalogClock, 1000);
    setInterval(updateCountdowns, 60000); // Минут тутамд тоолуур шинэчлэгдэнэ

    updateDate();
    updateAnalogClock();
    updateCountdowns();
    setupNotes();
</script>

</body>
</html>
