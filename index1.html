<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deadline Dashboard - Fixed Layout</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #f0f0f0;
            --accent-color: #4a90e2; 
            --border-style: 1px solid rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 80px;
            display: flex;
            justify-content: center;
        }

        .main-wrapper {
            display: flex;
            gap: 100px;
            max-width: 1400px;
            width: 100%;
        }

        /* --- LEFT SIDE --- */
        .content-area {
            flex: 2;
        }

        #current-date {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 60px;
            color: var(--text-color);
            letter-spacing: 1px;
        }

        .deadline-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .deadline-card {
            background: var(--bg-color);
        }

        /* GRID LAYOUT: 
           1st column: Name (Auto)
           2nd column: Date?
           3rd column: Remaining
        */
        .card-row-1 {
            display: grid;
            grid-template-columns: 1fr 2fr 100px; /* column size */
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: var(--border-style);
        }

        .timer-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .target-date {
            font-size: 1rem;
            color: #bbb;
            text-align: right; /* Date position */
            padding-right: 40px;
        }

        .countdown-text {
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-color);
            text-align: right;
        }
        /*Тэмдэглэл, тайлбар хэсэг */
        .note-area {
            width: 100%;
            background: transparent;
            border: var(--border-style);
            border-radius: 4px;
            color: #bbb;
            padding: 12px;
            font-size: 0.95rem;
            resize: none;
            box-sizing: border-box;
            line-height: 1.4;
            height: 120px; /*Блокийн өндөр*/
        }

        /* --- RIGHT SIDE CLOCK --- */
        .sidebar {
            flex: 0.5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .clock-container {
            width: 350px;
            height: 350px;
            background-color: rgba(26, 28, 39, 0.4);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clock {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
        }

        .clock::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 4px;
        }

        .hour { width: 3px; height: 100px; background: #fff; z-index: 3; }
        .min { width: 2px; height: 140px; background: #bbb; z-index: 2; }
        .sec { width: 0.5px; height: 145px; background: var(--accent-color); z-index: 1; }

    </style>
</head>
<body>

<div class="main-wrapper">
    
    <div class="content-area">
        <div id="current-date">Loading...</div>

        <div class="deadline-list">
            
            <div class="deadline-card" data-time="2026-05-15T09:00:00">
                <div class="card-row-1">
                    <div class="timer-name">Writing</div>
                    <div class="target-date">Sep 8, 2026</div>
                    <div class="countdown-text">-- days</div>
                </div>
                <textarea class="note-area" rows="4" placeholder="Started: March 8, 2026.&#10;Total: 360p.&#10;Speed: Daily 600-1200w (2-4p, 300w/p)&#10;Time: 90-180days"></textarea>
            </div>

            <div class="deadline-card" data-time="2026-05-16T18:00:00">
                <div class="card-row-1">
                    <div class="timer-name">Copy Editing</div>
                    <div class="target-date">Oct 8, 2026</div>
                    <div class="countdown-text">-- days</div>
                </div>
                <textarea class="note-area" rows="4" placeholder="Хэл зүйн редакци:	2-4 weeks (Зөв бичих дүрэм, цэг таслал), Текстийн зөв бичих дүрэм, цэг таслал, хэл зүйн алдааг засах техникийн шинжтэй ажил юм. Copyeditor хүн Үг үсэг, найруулгын жижиг алдаа, стандартыг шалгах ажил хийнэ."></textarea>
            </div>

            <div class="deadline-card" data-time="2026-12-31T23:59:59">
                <div class="card-row-1">
                    <div class="timer-name">Stylistic/Line Editing</div>
                    <div class="target-date">Nov 13, 2026</div>
                    <div class="countdown-text">-- days</div>
                </div>
                <textarea class="note-area" rows="4" placeholder="Найруулга зүйн редакци: 3-5 weeks (Хэллэг, хэмнэл, өгүүлбэрийн бүтэц), Текстийн урсгал, хэмнэл, үг сонголт болон өгүүлбэрийн бүтцийг сайжруулж, уншигчдад илүү ойлгомжтой, сонирхолтой болгох үйл явц. Stylistic/Line Editor хүн Зохиолчийн хэв маягийг хадгалахын зэрэгцээ найруулгыг өнгөлөх, нуршуу хэсгийг засах ажил хийнэ."></textarea>
            </div>

            <div class="deadline-card" data-time="2027-01-15T12:00:00">
                <div class="card-row-1">
                    <div class="timer-name">Developmental/Substantive Editing</div>
                    <div class="target-date">Jan 13, 2027</div>
                    <div class="countdown-text">-- days</div>
                </div>
                <textarea class="note-area" rows="4" placeholder="Шүүмжлэгч редакци:	4-8 weeks (Зохиомж, дүр, үйл явдлын уялдаа), Зохиолын бүтэц, дүрүүдийн хөгжил, үйл явдлын логик уялдаа холбоо зэрэг том зураглал-д дүн шинжилгээ хийж, шүүмжлэлтэйгээр засах үйл явц. Developmental/Substantive Editor хүн Зохиолын агуулгын гүн рүү орж, логик алдааг засах, зохиомжийг сайжруулах зөвлөгөө өгөх ажил хйинэ."></textarea>
            </div>

            <div class="deadline-card" data-time="2027-02-01T00:00:00">
                <div class="card-row-1">
                    <div class="timer-name">TASK 5</div>
                    <div class="target-date">Feb 01, 2027</div>
                    <div class="countdown-text">-- days</div>
                </div>
                <textarea class="note-area" rows="4" placeholder="Description here..."></textarea>
            </div>

            <div class="deadline-card" data-time="2027-01-15T12:00:00">
                <div class="card-row-1">
                    <div class="timer-name">TASK 6</div>
                    <div class="target-date">Jan 15, 2027</div>
                    <div class="countdown-text">-- days</div>
                </div>
                <textarea class="note-area" rows="4" placeholder="Description here..."></textarea>
            </div>

            <div class="deadline-card" data-time="2027-01-15T12:00:00">
                <div class="card-row-1">
                    <div class="timer-name">TASK 7</div>
                    <div class="target-date">Jan 15, 2027</div>
                    <div class="countdown-text">-- days</div>
                </div>
                <textarea class="note-area" rows="4" placeholder="Description here..."></textarea>
            </div>

            <div class="deadline-card" data-time="2027-01-15T12:00:00">
                <div class="card-row-1">
                    <div class="timer-name">TASK 8</div>
                    <div class="target-date">Jan 15, 2027</div>
                    <div class="countdown-text">-- days</div>
                </div>
                <textarea class="note-area" rows="4" placeholder="Description here..."></textarea>
            </div>




        </div>
    </div>

    <div class="sidebar">
        <div class="clock-container">
            <div class="clock">
                <div class="hand hour" id="hour-hand"></div>
                <div class="hand min" id="min-hand"></div>
                <div class="hand sec" id="sec-hand"></div>
            </div>
        </div>
    </div>

</div>

<script>
    function updateDate() {
        const now = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('current-date').innerText = now.toLocaleDateString('en-US', options);
    }

    function updateAnalogClock() {
        const now = new Date();
        const s = now.getSeconds() * 6;
        const m = now.getMinutes() * 6;
        const h = (now.getHours() % 12) * 30 + (now.getMinutes() / 2);

        document.getElementById('sec-hand').style.transform = `translateX(-50%) rotate(${s}deg)`;
        document.getElementById('min-hand').style.transform = `translateX(-50%) rotate(${m}deg)`;
        document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${h}deg)`;
    }

    function updateCountdowns() {
        const cards = document.querySelectorAll('.deadline-card');
        cards.forEach(card => {
            const targetTime = new Date(card.getAttribute('data-time')).getTime();
            const now = new Date().getTime();
            const diff = targetTime - now;
            const display = card.querySelector('.countdown-text');

            if (diff <= 0) {
                display.innerText = "Expired";
                display.style.color = "#ff4d4d";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            display.innerText = `${d + 1} days`; 
            display.style.color = "#f0f0f0";
        });
    }

    setInterval(() => {
        updateAnalogClock();
        updateCountdowns();
    }, 1000);

    updateDate();
    updateAnalogClock();
    updateCountdowns();
</script>

</body>
</html>
