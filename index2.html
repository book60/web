<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bite - It's time to brush better</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Үндсэн тохиргоо */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary-black: #000000;
            --promo-lime: #DFFF5E; /* Дээд талын урамшууллын хэсгийн өнгө */
            --text-white: #ffffff;
        }

        /* Урамшууллын дээд хэсэг (Banner) */
        .promo-bar {
            background-color: var(--promo-lime);
            text-align: center;
            padding: 10px 0;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Навигацийн хэсэг */
        header {
            position: absolute;
            top: 40px; /* Promo-bar-ын доор байрлах зай */
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            z-index: 10;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-black);
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--primary-black);
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .icons {
            display: flex;
            gap: 20px;
            font-size: 20px;
        }

        /* Hero section - Үндсэн нүүр */
        .hero {
            height: 100vh;
            width: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://images.unsplash.com/photo-1600170311833-c2cf5280ce49?auto=format&fit=crop&q=80&w=2000'); /* Жишээ зураг - Байгалийн аястай */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding-left: 80px;
            position: relative;
        }

        .hero-content {
            max-width: 500px;
            color: var(--text-white);
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 84px; /* Том гарчиг */
            line-height: 0.9;
            margin-bottom: 25px;
        }

        .hero-content p {
            font-size: 22px;
            line-height: 1.4;
            margin-bottom: 35px;
            font-weight: 300;
        }

        /* Товчлуур */
        .btn-shop {
            background-color: var(--primary-black);
            color: white;
            padding: 18px 80px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s ease;
        }

        .btn-shop:hover {
            opacity: 0.8;
        }

        /* Гар утасны харагдац (Responsive) */
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 50px; }
            header { padding: 20px; }
            nav { display: none; } /* Гар утсан дээр цэсийг нуух */
            .hero { padding-left: 20px; }
        }
    </style>
</head>
<body>

    <div class="promo-bar">
        Ends Soon — <b>Free Welcome Kit</b> on orders $45+
    </div>

    <header>
        <a href="#" class="logo">Bite</a>
        
        <nav>
            <ul>
                <li><a href="#">Shop</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Our Impact</a></li>
            </ul>
        </nav>

        <div class="icons">
            <span>👤</span> <span>👜</span> </div>
    </header>

    <main class="hero">
        <div class="hero-content">
            <h1>It's time to brush better.</h1>
            <p>Clean up your routine with Toothpaste Bits. No plastic, no harsh chemicals – just a better way to brush your teeth.</p>
            <a href="#" class="btn-shop">Shop Now</a>
        </div>
    </main>

</body>
</html>
